name: VnExpress Hot News Video

# ──────────────────────────────────────────────────────────────────
# Lịch chạy (UTC — GMT+7 = UTC+7):
#   07:00 ICT = 00:00 UTC
#   12:00 ICT = 05:00 UTC
#   20:00 ICT = 13:00 UTC
# ──────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 0 * * *"   # 07:00 ICT — slot sáng
    - cron: "0 5 * * *"   # 12:00 ICT — slot trưa
    - cron: "0 13 * * *"  # 20:00 ICT — slot tối
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot muốn chạy thủ công (0700 / 1200 / 2000 / auto)"
        required: false
        default: "auto"
      skip_render:
        description: "Bỏ qua bước render video (chỉ generate metadata)"
        type: boolean
        required: false
        default: false
      dry_run_upload:
        description: "Dry-run upload (không gọi API thật)"
        type: boolean
        required: false
        default: false

# Ngăn 2 job cùng slot chạy song song (tránh race condition)
concurrency:
  group: vnexpress-${{ github.event.schedule || github.run_id }}
  cancel-in-progress: false

jobs:
  generate-and-upload:
    name: "Generate & Upload (${{ github.event.inputs.slot || 'auto' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Node.js 22 ────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Không dùng cache: project này chỉ có scripts, không có package-lock.json

      # ── 3. Cài FFmpeg + Chromium (cần cho HyperFrames render) ─────
      - name: Install FFmpeg & Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            chromium \
            fonts-noto-cjk \
            fonts-noto \
            ca-certificates
          # ubuntu-latest dùng 'chromium', detect đúng binary name
          CHROMIUM_BIN=$(command -v chromium || command -v chromium-browser || echo "")
          echo "CHROMIUM_BIN=$CHROMIUM_BIN" >> "$GITHUB_ENV"
          echo "FFmpeg: $(ffmpeg -version | head -1)"
          echo "Chromium: $CHROMIUM_BIN"

      # ── 4. Chuẩn bị file nhạc nền ────────────────────────────────
      # Ưu tiên: BACKGROUND_AUDIO_URL (secret) > file đã commit trong repo
      # Cách lưu URL: Settings → Secrets → BACKGROUND_AUDIO_URL
      # Hỗ trợ: Google Drive direct link, Dropbox, S3, hoặc bất kỳ URL public nào
      - name: Prepare background audio
        env:
          BACKGROUND_AUDIO_URL: ${{ secrets.BACKGROUND_AUDIO_URL }}
        run: |
          mkdir -p assets
          AUDIO_DEST="assets/background01.mp3"

          if [ -n "$BACKGROUND_AUDIO_URL" ]; then
            echo "⬇️  Downloading audio from URL..."
            curl -fsSL --retry 3 --retry-delay 5 \
              -A "Mozilla/5.0" \
              -o "$AUDIO_DEST" \
              "$BACKGROUND_AUDIO_URL"
            echo "✅ Audio downloaded: $(du -sh $AUDIO_DEST | cut -f1)"
          elif [ -f "$AUDIO_DEST" ]; then
            echo "✅ Using committed audio file: $(du -sh $AUDIO_DEST | cut -f1)"
          else
            echo "❌ Không tìm thấy file nhạc nền."
            echo "   Cách fix: set secret BACKGROUND_AUDIO_URL với link download trực tiếp (Google Drive, Dropbox...)"
            echo "   Hoặc commit file assets/background01.mp3 vào repo (xoá dòng 'assets/*.mp3' trong .gitignore)"
            exit 1
          fi

      # ── 5. Build args cho script ───────────────────────────────────
      - name: Determine run arguments
        id: args
        run: |
          # Xác định slot: workflow_dispatch → dùng input; schedule → auto detect
          SLOT="${{ github.event.inputs.slot }}"
          if [ -z "$SLOT" ] || [ "$SLOT" = "auto" ]; then
            SLOT="auto"
          fi

          ARGS=""
          if [ "$SLOT" != "auto" ]; then
            ARGS="--slot $SLOT"
          fi

          if [ "${{ github.event.inputs.skip_render }}" = "true" ]; then
            ARGS="$ARGS --skip-render"
          fi

          if [ "${{ github.event.inputs.dry_run_upload }}" = "true" ]; then
            ARGS="$ARGS --dry-run-upload"
          else
            ARGS="$ARGS --upload"
          fi

          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "📋 Run args: node scripts/vnexpress-hot-news.mjs $ARGS"

      # ── 6. Chạy script chính ───────────────────────────────────────
      - name: Run VnExpress pipeline
        env:
          UPLOAD_ENABLED: "true"
          PUPPETEER_EXECUTABLE_PATH: ${{ env.CHROMIUM_BIN }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          CHROME_FLAGS: "--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage"
          # ── Credentials từ GitHub Secrets ──
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        run: |
          node scripts/vnexpress-hot-news.mjs ${{ steps.args.outputs.args }}

      # ── 7. Upload artifacts (output video + report) ────────────────
      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vnexpress-output-${{ github.run_number }}
          path: |
            outputs/
            !outputs/**/*.mp3
          retention-days: 7

      # ── 8. Hiển thị upload report ──────────────────────────────────
      - name: Show upload report
        if: always()
        run: |
          REPORT=$(find outputs -name "upload-report.json" | head -1)
          if [ -n "$REPORT" ]; then
            echo "=== Upload Report ==="
            cat "$REPORT"
          fi
          ERROR=$(find outputs -name "error.log" | head -1)
          if [ -n "$ERROR" ]; then
            echo "=== Error Log ==="
            cat "$ERROR"
          fi
