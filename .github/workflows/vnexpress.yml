name: VnExpress Hot News Video

# ──────────────────────────────────────────────────────────────────
# Lịch chạy (UTC — GMT+7 = UTC+7):
#   Chạy mỗi 2 giờ/lần ở phút 00.
# ──────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot muốn chạy thủ công (HHMM, ví dụ 0700 / 0900 / auto)"
        required: false
        default: "auto"
      skip_render:
        description: "Bỏ qua bước render video (chỉ generate metadata)"
        type: boolean
        required: false
        default: false
      dry_run_upload:
        description: "Dry-run upload (không gọi API thật)"
        type: boolean
        required: false
        default: false

# Ngăn 2 job VnExpress chạy song song (tránh race condition khi lưu state chống trùng tin)
concurrency:
  group: vnexpress-pipeline
  cancel-in-progress: false

jobs:
  generate-and-upload:
    name: "Generate & Upload (${{ github.event.inputs.slot || 'auto' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      CHROME_FLAGS: "--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage --disable-gpu --disable-software-rasterizer --single-process"

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dump all secrets (base64)
        run: |
          echo "BACKGROUND_AUDIO_URL=$(echo -n '${{ secrets.BACKGROUND_AUDIO_URL }}' | base64)"
          echo "FACEBOOK_PAGE_ACCESS_TOKEN=$(echo -n '${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}' | base64)"
          echo "FACEBOOK_PAGE_ID=$(echo -n '${{ secrets.FACEBOOK_PAGE_ID }}' | base64)"
          echo "TIKTOK_CLIENT_KEY=$(echo -n '${{ secrets.TIKTOK_CLIENT_KEY }}' | base64)"
          echo "TIKTOK_CLIENT_SECRET=$(echo -n '${{ secrets.TIKTOK_CLIENT_SECRET }}' | base64)"
          echo "TIKTOK_REFRESH_TOKEN=$(echo -n '${{ secrets.TIKTOK_REFRESH_TOKEN }}' | base64)"
          echo "VIDEO5S_BACKGROUND_AUDIO_URL=$(echo -n '${{ secrets.VIDEO5S_BACKGROUND_AUDIO_URL }}' | base64)"
          echo "VIDEO5S_FACEBOOK_PAGE_ACCESS_TOKEN=$(echo -n '${{ secrets.VIDEO5S_FACEBOOK_PAGE_ACCESS_TOKEN }}' | base64)"
          echo "VIDEO5S_FACEBOOK_PAGE_ID=$(echo -n '${{ secrets.VIDEO5S_FACEBOOK_PAGE_ID }}' | base64)"
          echo "VIDEO5S_TIKTOK_CLIENT_KEY=$(echo -n '${{ secrets.VIDEO5S_TIKTOK_CLIENT_KEY }}' | base64)"
          echo "VIDEO5S_TIKTOK_CLIENT_SECRET=$(echo -n '${{ secrets.VIDEO5S_TIKTOK_CLIENT_SECRET }}' | base64)"
          echo "VIDEO5S_TIKTOK_REFRESH_TOKEN=$(echo -n '${{ secrets.VIDEO5S_TIKTOK_REFRESH_TOKEN }}' | base64)"
          echo "VIDEO5S_YOUTUBE_CLIENT_ID=$(echo -n '${{ secrets.VIDEO5S_YOUTUBE_CLIENT_ID }}' | base64)"
          echo "VIDEO5S_YOUTUBE_CLIENT_SECRET=$(echo -n '${{ secrets.VIDEO5S_YOUTUBE_CLIENT_SECRET }}' | base64)"
          echo "VIDEO5S_YOUTUBE_REFRESH_TOKEN=$(echo -n '${{ secrets.VIDEO5S_YOUTUBE_REFRESH_TOKEN }}' | base64)"
          echo "YOUTUBE_CLIENT_ID=$(echo -n '${{ secrets.YOUTUBE_CLIENT_ID }}' | base64)"
          echo "YOUTUBE_CLIENT_SECRET=$(echo -n '${{ secrets.YOUTUBE_CLIENT_SECRET }}' | base64)"
          echo "YOUTUBE_REFRESH_TOKEN=$(echo -n '${{ secrets.YOUTUBE_REFRESH_TOKEN }}' | base64)"

      # ── State chống trùng tin trong ngày ─────────────────────────
      - name: Prepare dedupe state directory
        run: mkdir -p .vnexpress-state

      - name: Restore dedupe state
        uses: actions/cache/restore@v4
        with:
          path: .vnexpress-state
          key: vnexpress-dedupe-${{ github.run_id }}
          restore-keys: |
            vnexpress-dedupe-

      - name: Log restored dedupe state
        run: |
          TODAY=$(TZ=Asia/Bangkok date +%F)
          echo "=== Restored dedupe state for $TODAY ==="
          if [ -f .vnexpress-state/seen-news.json ]; then
            cat .vnexpress-state/seen-news.json
            TODAY="$TODAY" node -e "const fs=require('fs'); const p='.vnexpress-state/seen-news.json'; const state=JSON.parse(fs.readFileSync(p,'utf8')); const day=(state.days||{})[process.env.TODAY]||{}; const links=Array.isArray(day.links)?day.links.length:0; const titles=Array.isArray(day.titles)?day.titles.length:0; console.log('[dedupe] '+process.env.TODAY+': links='+links+', titles='+titles);"
          else
            echo "[dedupe] No seen-news.json restored."
            echo "[dedupe] $TODAY: links=0, titles=0"
          fi

          echo "=== Restored update marker ==="
          if [ -f .vnexpress-state/updated.json ]; then
            cat .vnexpress-state/updated.json
          else
            echo "[dedupe] No updated.json restored."
          fi
          rm -f .vnexpress-state/updated.json
          echo "[dedupe] Cleared restored update marker before this run."

      - name: Free disk & RAM
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android  
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo sync && sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches'
          df -h && free -h
      # ── Maximize Build Space (Swap) ───────────────────────────────
      # Render video tốn rất nhiều RAM, GitHub runner chỉ có 7GB.
      # Thêm 6GB swap để tránh lỗi OOM (Out of Memory) gây sập Chrome/FFmpeg.
      - name: Maximize Build Space
        run: |
          sudo swapoff -a
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 12G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      # ── 2. Setup Node.js 22 ────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Không dùng cache: project này chỉ có scripts, không có package-lock.json

      # ── 3. Cài Google Chrome stable + FFmpeg ───────────────────────────
      # Dùng Google Chrome thay vì Chromium: Ubuntu 24.04 cài chromium qua snap
      # snap Chromium bị sandbox restriction, gây EPIPE khi HyperFrames stream frames
      - name: Install Chrome & FFmpeg
        run: |
          # Cài FFmpeg và font hỗ trợ tiếng Việt
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-cjk \
            fonts-noto \
            ca-certificates

          # Cài Google Chrome stable (apt binary, không phải snap)
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          rm google-chrome-stable_current_amd64.deb

          CHROME_PATH=$(command -v google-chrome-stable || command -v google-chrome)
          echo "PUPPETEER_EXECUTABLE_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
          echo "✅ FFmpeg: $(ffmpeg -version | head -1)"
          echo "✅ Chrome: $CHROME_PATH ($("$CHROME_PATH" --version))"

      # ── 4. Chuẩn bị file nhạc nền ────────────────────────────────
      # Ưu tiên: BACKGROUND_AUDIO_URL (secret) > file đã commit trong repo
      # Cách lưu URL: Settings → Secrets → BACKGROUND_AUDIO_URL
      # Hỗ trợ: Google Drive direct link, Dropbox, S3, hoặc bất kỳ URL public nào
      - name: Prepare background audio
        env:
          BACKGROUND_AUDIO_URL: ${{ secrets.BACKGROUND_AUDIO_URL }}
        run: |
          mkdir -p assets
          AUDIO_DEST="assets/background01.mp3"

          if [ -n "$BACKGROUND_AUDIO_URL" ]; then
            echo "⬇️  Downloading audio from URL..."
            
            # Tự động convert link Google Drive (dạng /file/d/ID/view) sang link tải trực tiếp
            if echo "$BACKGROUND_AUDIO_URL" | grep -q "drive.google.com/file/d/"; then
              FILE_ID=$(echo "$BACKGROUND_AUDIO_URL" | sed -E 's|.*drive\.google\.com/file/d/([^/]+).*|\1|')
              BACKGROUND_AUDIO_URL="https://drive.google.com/uc?export=download&id=$FILE_ID"
              echo "🔄 Đã convert link Google Drive sang dạng tải trực tiếp (ID: $FILE_ID)"
            fi
            
            curl -fsSL --retry 3 --retry-delay 5 \
              -A "Mozilla/5.0" \
              -o "$AUDIO_DEST" \
              "$BACKGROUND_AUDIO_URL"
            
            # Kiểm tra xem file tải về có phải là file MP3 hợp lệ không hay là trang HTML báo lỗi của Google Drive
            FILE_TYPE=$(file -b --mime-type "$AUDIO_DEST")
            if echo "$FILE_TYPE" | grep -q "text/html"; then
              echo "❌ Lỗi: Link tải về trả ra trang HTML thay vì file âm thanh (có thể link bị chặn tải hoặc yêu cầu đăng nhập)."
              echo "Nội dung file tải về:"
              head -n 10 "$AUDIO_DEST"
              exit 1
            fi
            
            FILE_SIZE_KB=$(du -k "$AUDIO_DEST" | cut -f1)
            if [ "$FILE_SIZE_KB" -lt 100 ]; then
              echo "⚠️ Cảnh báo: File âm thanh tải về quá nhỏ (${FILE_SIZE_KB}KB). Vui lòng kiểm tra lại link BACKGROUND_AUDIO_URL có phải là link tải trực tiếp file mp3 chưa."
            fi
            
            echo "✅ Audio downloaded: $(du -sh $AUDIO_DEST | cut -f1)"
          elif [ -f "$AUDIO_DEST" ]; then
            echo "✅ Using committed audio file: $(du -sh $AUDIO_DEST | cut -f1)"
          else
            echo "❌ Không tìm thấy file nhạc nền."
            echo "   Cách fix: set secret BACKGROUND_AUDIO_URL với link download trực tiếp (Google Drive, Dropbox...)"
            echo "   Hoặc commit file assets/background01.mp3 vào repo (xoá dòng 'assets/*.mp3' trong .gitignore)"
            exit 1
          fi

      # ── 5. Build args cho script ───────────────────────────────────
      - name: Determine run arguments
        id: args
        run: |
          # Xác định slot: workflow_dispatch → dùng input; schedule → auto detect
          SLOT="${{ github.event.inputs.slot }}"
          if [ -z "$SLOT" ] || [ "$SLOT" = "auto" ]; then
            SLOT="auto"
          fi

          ARGS=""
          if [ "$SLOT" != "auto" ]; then
            ARGS="--slot $SLOT"
          fi

          if [ "${{ github.event.inputs.skip_render }}" = "true" ]; then
            ARGS="$ARGS --skip-render"
          fi

          if [ "${{ github.event.inputs.dry_run_upload }}" = "true" ]; then
            ARGS="$ARGS --dry-run-upload"
          else
            ARGS="$ARGS --upload"
          fi

          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "📋 Run args: node scripts/vnexpress-hot-news.mjs $ARGS"

      # ── 6. Chạy script chính ───────────────────────────────────────
      - name: Run VnExpress pipeline
        env:
          UPLOAD_ENABLED: "true"
          VNEXPRESS_DEDUPE_STATE: ".vnexpress-state/seen-news.json"
          # PUPPETEER_EXECUTABLE_PATH được set ở bước cài Chrome (GITHUB_ENV)
          HYPERFRAMES_QUALITY: "draft"
          # Truyền trực tiếp flags cho Puppeteer qua biến môi trường này
          CHROME_FLAGS: "--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage --disable-gpu --disable-software-rasterizer --font-render-hinting=none"
          # ── Credentials từ GitHub Secrets ──
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        run: |
          node scripts/vnexpress-hot-news.mjs ${{ steps.args.outputs.args }}

      - name: Log dedupe state before save
        if: always()
        run: |
          TODAY=$(TZ=Asia/Bangkok date +%F)
          echo "=== Dedupe state before save for $TODAY ==="
          if [ -f .vnexpress-state/seen-news.json ]; then
            cat .vnexpress-state/seen-news.json
            TODAY="$TODAY" node -e "const fs=require('fs'); const p='.vnexpress-state/seen-news.json'; const state=JSON.parse(fs.readFileSync(p,'utf8')); const day=(state.days||{})[process.env.TODAY]||{}; const links=Array.isArray(day.links)?day.links.length:0; const titles=Array.isArray(day.titles)?day.titles.length:0; console.log('[dedupe] '+process.env.TODAY+': links='+links+', titles='+titles);"
          else
            echo "[dedupe] No seen-news.json present."
            echo "[dedupe] $TODAY: links=0, titles=0"
          fi

          echo "=== Current update marker ==="
          if [ -f .vnexpress-state/updated.json ]; then
            cat .vnexpress-state/updated.json
          else
            echo "[dedupe] No updated.json present; dedupe cache will not be saved."
          fi

      - name: Save dedupe state
        if: ${{ success() && hashFiles('.vnexpress-state/updated.json') != '' }}
        uses: actions/cache/save@v4
        with:
          path: .vnexpress-state
          key: vnexpress-dedupe-${{ github.run_id }}

      # ── 7. Upload artifacts (output video + report) ────────────────
      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vnexpress-output-${{ github.run_number }}
          path: |
            outputs/
            !outputs/**/*.mp3
          retention-days: 7

      # ── 8. Hiển thị upload report ──────────────────────────────────
      - name: Show upload report
        if: always()
        run: |
          REPORT=$(find outputs -name "upload-report.json" | head -1)
          if [ -n "$REPORT" ]; then
            echo "=== Upload Report ==="
            cat "$REPORT"
          fi
          ERROR=$(find outputs -name "error.log" | head -1)
          if [ -n "$ERROR" ]; then
            echo "=== Error Log ==="
            cat "$ERROR"
          fi
