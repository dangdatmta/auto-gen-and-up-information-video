name: Video 5s Hot News

# ──────────────────────────────────────────────────────────────────
# Lịch chạy (UTC — GMT+7 = UTC+7):
#   Chạy mỗi 2 giờ/lần ở phút 00.
# ──────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot muốn chạy thủ công (HHMM, ví dụ 0700 / 0900 / auto)"
        required: false
        default: "auto"
      skip_render:
        description: "Bỏ qua bước render video (chỉ generate metadata)"
        type: boolean
        required: false
        default: false
      dry_run_upload:
        description: "Dry-run upload (không gọi API thật)"
        type: boolean
        required: false
        default: false

# Ngăn 2 job Video 5s chạy song song
concurrency:
  group: video-5s-pipeline
  cancel-in-progress: false

jobs:
  generate-and-upload:
    name: "Video 5s (${{ github.event.inputs.slot || 'auto' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      CHROME_FLAGS: "--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage --disable-gpu --disable-software-rasterizer --single-process"

    steps:
      # ── 1. Checkout nhánh feature/video-5s ────────────────────────
      - name: Checkout feature/video-5s
        uses: actions/checkout@v4
        with:
          ref: feature/video-5s

      # ── State chống trùng tin trong ngày ─────────────────────────
      - name: Prepare dedupe state directory
        run: mkdir -p .vnexpress-state

      - name: Restore dedupe state
        uses: actions/cache/restore@v4
        with:
          path: .vnexpress-state
          key: video5s-dedupe-${{ github.run_id }}
          restore-keys: |
            video5s-dedupe-

      - name: Log restored dedupe state
        run: |
          TODAY=$(TZ=Asia/Bangkok date +%F)
          echo "=== Restored dedupe state for $TODAY ==="
          if [ -f .vnexpress-state/seen-news.json ]; then
            cat .vnexpress-state/seen-news.json
            TODAY="$TODAY" node -e "const fs=require('fs'); const p='.vnexpress-state/seen-news.json'; const state=JSON.parse(fs.readFileSync(p,'utf8')); const day=(state.days||{})[process.env.TODAY]||{}; const links=Array.isArray(day.links)?day.links.length:0; const titles=Array.isArray(day.titles)?day.titles.length:0; console.log('[dedupe] '+process.env.TODAY+': links='+links+', titles='+titles);"
          else
            echo "[dedupe] No seen-news.json restored."
            echo "[dedupe] $TODAY: links=0, titles=0"
          fi

          echo "=== Restored update marker ==="
          if [ -f .vnexpress-state/updated.json ]; then
            cat .vnexpress-state/updated.json
          else
            echo "[dedupe] No updated.json restored."
          fi
          rm -f .vnexpress-state/updated.json
          echo "[dedupe] Cleared restored update marker before this run."

      # ── Maximize Build Space (Swap) ───────────────────────────────
      - name: Maximize Build Space
        run: |
          sudo swapoff -a
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 12G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      # ── 2. Setup Node.js 22 ────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python for hook TTS
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Cache VieNeu virtualenv
        uses: actions/cache@v4
        with:
          path: .venv-vieneu
          key: video5s-vieneu-${{ runner.os }}-py312-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            video5s-vieneu-${{ runner.os }}-py312-

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: video5s-hf-${{ runner.os }}-vieneu
          restore-keys: |
            video5s-hf-${{ runner.os }}-

      - name: Install VieNeu TTS
        run: |
          python -m venv .venv-vieneu
          .venv-vieneu/bin/python -m pip install --upgrade pip
          .venv-vieneu/bin/python -m pip install -r requirements.txt

      # ── 3. Cài Google Chrome stable + FFmpeg ──────────────────────
      - name: Install Chrome & FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-cjk \
            fonts-noto \
            ca-certificates

          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          rm google-chrome-stable_current_amd64.deb

          CHROME_PATH=$(command -v google-chrome-stable || command -v google-chrome)
          echo "PUPPETEER_EXECUTABLE_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
          echo "✅ FFmpeg: $(ffmpeg -version | head -1)"
          echo "✅ Chrome: $CHROME_PATH ($("$CHROME_PATH" --version))"

      # ── 4. Chuẩn bị file nhạc nền ─────────────────────────────────
      - name: Prepare background audio
        env:
          BACKGROUND_AUDIO_URL: ${{ secrets.VIDEO5S_BACKGROUND_AUDIO_URL }}
        run: |
          mkdir -p assets
          AUDIO_DEST="assets/background01.mp3"

          if [ -n "$BACKGROUND_AUDIO_URL" ]; then
            echo "⬇️  Downloading audio from URL..."

            if echo "$BACKGROUND_AUDIO_URL" | grep -q "drive.google.com/file/d/"; then
              FILE_ID=$(echo "$BACKGROUND_AUDIO_URL" | sed -E 's|.*drive\.google\.com/file/d/([^/]+).*|\1|')
              BACKGROUND_AUDIO_URL="https://drive.google.com/uc?export=download&id=$FILE_ID"
              echo "🔄 Đã convert link Google Drive (ID: $FILE_ID)"
            fi

            curl -fsSL --retry 3 --retry-delay 5 \
              -A "Mozilla/5.0" \
              -o "$AUDIO_DEST" \
              "$BACKGROUND_AUDIO_URL"

            FILE_TYPE=$(file -b --mime-type "$AUDIO_DEST")
            if echo "$FILE_TYPE" | grep -q "text/html"; then
              echo "❌ Lỗi: Link trả về HTML thay vì file âm thanh."
              head -n 10 "$AUDIO_DEST"
              exit 1
            fi

            FILE_SIZE_KB=$(du -k "$AUDIO_DEST" | cut -f1)
            if [ "$FILE_SIZE_KB" -lt 100 ]; then
              echo "⚠️ Cảnh báo: File âm thanh quá nhỏ (${FILE_SIZE_KB}KB)."
            fi

            echo "✅ Audio downloaded: $(du -sh $AUDIO_DEST | cut -f1)"
          elif [ -f "$AUDIO_DEST" ]; then
            echo "✅ Using committed audio file: $(du -sh $AUDIO_DEST | cut -f1)"
          else
            echo "❌ Không tìm thấy file nhạc nền."
            exit 1
          fi

      # ── 5. Build args cho script ───────────────────────────────────
      - name: Determine run arguments
        id: args
        run: |
          SLOT="${{ github.event.inputs.slot }}"
          if [ -z "$SLOT" ] || [ "$SLOT" = "auto" ]; then
            SLOT="auto"
          fi

          ARGS=""
          if [ "$SLOT" != "auto" ]; then
            ARGS="--slot $SLOT"
          fi

          if [ "${{ github.event.inputs.skip_render }}" = "true" ]; then
            ARGS="$ARGS --skip-render"
          fi

          if [ "${{ github.event.inputs.dry_run_upload }}" = "true" ]; then
            ARGS="$ARGS --dry-run-upload"
          else
            ARGS="$ARGS --upload"
          fi

          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "📋 Run args: node scripts/vnexpress-hot-news.mjs $ARGS"

      # ── 6. Chạy script chính ───────────────────────────────────────
      - name: Run Video 5s pipeline
        env:
          UPLOAD_ENABLED: "true"
          VNEXPRESS_DEDUPE_STATE: ".vnexpress-state/seen-news.json"
          HYPERFRAMES_QUALITY: "draft"
          CHROME_FLAGS: "--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage --disable-gpu --disable-software-rasterizer --font-render-hinting=none"
          HOOK_TTS_ENABLED: ${{ secrets.VIDEO5S_HOOK_TTS_ENABLED || 'true' }}
          HOOK_TTS_PROVIDER: ${{ secrets.VIDEO5S_HOOK_TTS_PROVIDER || 'vieneu' }}
          HOOK_TTS_PYTHON: ".venv-vieneu/bin/python"
          HOOK_TTS_START_OFFSET: ${{ secrets.VIDEO5S_HOOK_TTS_START_OFFSET || '0.45' }}
          HOOK_TTS_MAX_SECONDS: ${{ secrets.VIDEO5S_HOOK_TTS_MAX_SECONDS || '6.8' }}
          HOOK_TTS_VOLUME: ${{ secrets.VIDEO5S_HOOK_TTS_VOLUME || '1.0' }}
          BACKGROUND_VOLUME: ${{ secrets.VIDEO5S_BACKGROUND_VOLUME || '0.42' }}
          BACKGROUND_VOLUME_WITH_TTS: ${{ secrets.VIDEO5S_BACKGROUND_VOLUME_WITH_TTS || '0.25' }}
          VIENEU_MODE: ${{ secrets.VIDEO5S_VIENEU_MODE || 'standard' }}
          VIENEU_EMOTION: ${{ secrets.VIDEO5S_VIENEU_EMOTION || 'natural' }}
          VIENEU_VOICE_ID: ${{ secrets.VIDEO5S_VIENEU_VOICE_ID }}
          VIENEU_API_BASE: ${{ secrets.VIDEO5S_VIENEU_API_BASE }}
          VIENEU_MODEL_NAME: ${{ secrets.VIDEO5S_VIENEU_MODEL_NAME || 'pnnbao-ump/VieNeu-TTS-v2' }}
          HF_TOKEN: ${{ secrets.VIDEO5S_HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.VIDEO5S_HF_TOKEN }}
          # ── Credentials từ GitHub Secrets ──
          FACEBOOK_PAGE_ID: ${{ secrets.VIDEO5S_FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.VIDEO5S_FACEBOOK_PAGE_ACCESS_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.VIDEO5S_YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.VIDEO5S_YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.VIDEO5S_YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.VIDEO5S_TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.VIDEO5S_TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.VIDEO5S_TIKTOK_REFRESH_TOKEN }}
        run: |
          node scripts/vnexpress-hot-news.mjs ${{ steps.args.outputs.args }}

      - name: Log dedupe state before save
        if: always()
        run: |
          TODAY=$(TZ=Asia/Bangkok date +%F)
          echo "=== Dedupe state before save for $TODAY ==="
          if [ -f .vnexpress-state/seen-news.json ]; then
            cat .vnexpress-state/seen-news.json
            TODAY="$TODAY" node -e "const fs=require('fs'); const p='.vnexpress-state/seen-news.json'; const state=JSON.parse(fs.readFileSync(p,'utf8')); const day=(state.days||{})[process.env.TODAY]||{}; const links=Array.isArray(day.links)?day.links.length:0; const titles=Array.isArray(day.titles)?day.titles.length:0; console.log('[dedupe] '+process.env.TODAY+': links='+links+', titles='+titles);"
          else
            echo "[dedupe] No seen-news.json present."
            echo "[dedupe] $TODAY: links=0, titles=0"
          fi

          echo "=== Current update marker ==="
          if [ -f .vnexpress-state/updated.json ]; then
            cat .vnexpress-state/updated.json
          else
            echo "[dedupe] No updated.json present; dedupe cache will not be saved."
          fi

      - name: Save dedupe state
        if: ${{ success() && hashFiles('.vnexpress-state/updated.json') != '' }}
        uses: actions/cache/save@v4
        with:
          path: .vnexpress-state
          key: video5s-dedupe-${{ github.run_id }}

      # ── 7. Upload artifacts ────────────────────────────────────────
      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video5s-output-${{ github.run_number }}
          path: |
            outputs/
            !outputs/**/*.mp3
          retention-days: 7

      # ── 8. Hiển thị upload report ──────────────────────────────────
      - name: Show upload report
        if: always()
        run: |
          REPORT=$(find outputs -name "upload-report.json" | head -1)
          if [ -n "$REPORT" ]; then
            echo "=== Upload Report ==="
            cat "$REPORT"
          fi
          ERROR=$(find outputs -name "error.log" | head -1)
          if [ -n "$ERROR" ]; then
            echo "=== Error Log ==="
            cat "$ERROR"
          fi
